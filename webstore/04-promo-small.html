<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px; height: 280px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
    overflow: hidden;
  }
  .container {
    display: flex; align-items: center; gap: 24px;
  }
  .icon-wrap {
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.2);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .text-area {
    display: flex; flex-direction: column; gap: 8px;
  }
  .title {
    font-size: 28px; font-weight: 800; color: white;
    letter-spacing: 1px;
  }
  .desc {
    font-size: 16px; color: rgba(255,255,255,0.9);
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <svg width="64" height="64" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
        <circle cx="64" cy="66" r="38" fill="none" stroke="white" stroke-width="6"/>
        <line x1="64" y1="66" x2="64" y2="42" stroke="white" stroke-width="6" stroke-linecap="round"/>
        <line x1="64" y1="66" x2="80" y2="58" stroke="white" stroke-width="4" stroke-linecap="round"/>
        <circle cx="64" cy="66" r="4" fill="white"/>
        <g transform="translate(82, 82)">
          <circle cx="0" cy="0" r="12" fill="none" stroke="#FFF176" stroke-width="4"/>
          <line x1="8" y1="8" x2="20" y2="20" stroke="#FFF176" stroke-width="5" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <div class="text-area">
      <div class="title">SearchClock</div>
      <div class="desc">Google検索の<br>期間指定を固定化</div>
    </div>
  </div>
</body>
</html>
