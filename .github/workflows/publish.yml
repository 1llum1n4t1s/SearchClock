name: Publish to Chrome Web Store

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  publish:
    name: Chrome Web Store 公開
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        # SHA pin (actions/checkout v5.0.1) でサプライチェーン攻撃を防ぐ
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: バージョンを取得
        id: version
        run: |
          version=$(grep -oP '(?<="version": ")[^"]+' manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "📦 公開対象バージョン: $version"

      - name: ブランチ名とバージョンの整合性を確認
        env:
          BRANCH_VERSION: ${{ github.ref_name }}
          MANIFEST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          expected="release/${MANIFEST_VERSION}"
          if [ "$BRANCH_VERSION" != "$expected" ]; then
            echo "::error::ブランチ名 ($BRANCH_VERSION) と manifest.json のバージョン ($MANIFEST_VERSION) が一致しません。期待値: $expected"
            exit 1
          fi
          echo "✅ ブランチ名と manifest バージョン一致: $expected"

      - name: Node セットアップ
        # SHA pin (actions/setup-node v5.0.0) でサプライチェーン攻撃を防ぐ
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: 依存インストール
        # npm ci で package-lock.json の integrity を検証してインストール
        # chrome-webstore-upload-cli も devDependencies に固定済み
        run: npm ci

      - name: アイコン生成
        run: node scripts/generate-icons.js

      - name: zip パッケージを作成
        run: |
          zip -r search-clock.zip manifest.json icons src \
            -x "*.DS_Store" "*.swp" "*~"
          ls -lh search-clock.zip

      - name: Chrome Web Store にアップロード & 公開
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          # devDependencies に固定した chrome-webstore-upload-cli を npm exec で起動
          # （npx --yes による毎回ネットワーク取得 + 認証情報漏洩リスクを回避）
          npm exec --no-install -- chrome-webstore-upload upload \
            --source search-clock.zip \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish
          echo "🎉 Chrome Web Store への公開リクエストを送信したよ〜"
