name: Publish to Chrome Web Store

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  publish:
    name: Chrome Web Store 公開
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        # SHA pin (actions/checkout v5.0.1) でサプライチェーン攻撃を防ぐ
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: バージョンを取得
        id: version
        run: |
          version=$(grep -oP '(?<="version": ")[^"]+' manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "📦 公開対象バージョン: $version"

      - name: ブランチ名とバージョンの整合性を確認
        env:
          BRANCH_VERSION: ${{ github.ref_name }}
          MANIFEST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          expected="release/${MANIFEST_VERSION}"
          if [ "$BRANCH_VERSION" != "$expected" ]; then
            echo "::error::ブランチ名 ($BRANCH_VERSION) と manifest.json のバージョン ($MANIFEST_VERSION) が一致しません。期待値: $expected"
            exit 1
          fi
          echo "✅ ブランチ名と manifest バージョン一致: $expected"

      - name: pnpm セットアップ
        # SHA pin (pnpm/action-setup v4) でサプライチェーン攻撃を防ぐ
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 11

      - name: Node セットアップ
        # SHA pin (actions/setup-node v5.0.0) でサプライチェーン攻撃を防ぐ
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          # Node 20 は 2026-04 で EOL のため 22 (maintenance LTS) を使用
          node-version: '22'
          cache: 'pnpm'

      - name: 依存インストール
        # pnpm install --frozen-lockfile で pnpm-lock.yaml の integrity を検証してインストール
        # chrome-webstore-upload-cli も devDependencies に固定済み
        # PUPPETEER_SKIP_DOWNLOAD: CI ではスクショ生成しないので Chromium バイナリ (数百MB) は不要
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: pnpm install --frozen-lockfile

      - name: ユニットテスト
        # 公開前ゲート: presets.js の純粋関数テスト（node:test 内蔵、依存ゼロ）。
        # 失敗したら以降のパッケージング・アップロードを実行しない。
        run: pnpm test

      - name: Google ドメインリストの 3 箇所同期チェック
        # manifest.json (matches / host_permissions) と background.js (GOOGLE_DOMAINS) のズレを検知。
        # 片側欠落は部分機能不全 (DNR は動くが content script 未注入 等) を生む。
        run: node scripts/check-domains.js

      - name: アイコン生成
        run: node scripts/generate-icons.js

      - name: zip パッケージを作成
        run: |
          zip -r search-clock.zip manifest.json icons src \
            -x "*.DS_Store" "*.swp" "*~"
          ls -lh search-clock.zip

      - name: Chrome Web Store にアップロード & 公開
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
        run: |
          # devDependencies に固定した chrome-webstore-upload-cli v4 を pnpm exec で起動
          # （npx --yes による毎回ネットワーク取得 + 認証情報漏洩リスクを回避）
          # v4 は --client-id 等の CLI フラグを廃止し環境変数必須に変更。
          # コマンド(upload/publish)を省略すると upload→publish が自動で連続実行される。
          pnpm exec chrome-webstore-upload --source search-clock.zip
          echo "🎉 Chrome Web Store への公開リクエストを送信したよ〜"
