<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4"/>
      <stop offset="100%" style="stop-color:#1a73e8"/>
    </linearGradient>
  </defs>
  <!-- 角丸四角形の背景 -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>
  <!-- 時計の外枠 -->
  <circle cx="64" cy="66" r="38" fill="none" stroke="white" stroke-width="6"/>
  <!-- 時計の針（時針） -->
  <line x1="64" y1="66" x2="64" y2="42" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- 時計の針（分針） -->
  <line x1="64" y1="66" x2="80" y2="58" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- 中心の丸 -->
  <circle cx="64" cy="66" r="4" fill="white"/>
  <!-- 虫眼鏡（右下） -->
  <g transform="translate(82, 82)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#FFF176" stroke-width="4"/>
    <line x1="8" y1="8" x2="20" y2="20" stroke="#FFF176" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
